name: 24/7 Viral Stream Engine

on:
  workflow_dispatch:  # Allows manual start
  repository_dispatch: # Allows the Python script to trigger the next run
    types: [restart_stream]

jobs:
  build-and-stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # GitHub max is 360 (6 hours)
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies (FFmpeg)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python Requirements
        run: pip install Pillow requests

      - name: Run Stream with Auto-Handoff
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python stream.py
